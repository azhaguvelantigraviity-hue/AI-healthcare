services:
  - type: web
    name: healthcare-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://ai-healthcare-rosy.vercel.app
      - key: MONGODB_URI
        sync: false # You will set this manually in the Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
